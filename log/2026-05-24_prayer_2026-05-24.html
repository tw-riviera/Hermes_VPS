<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026.05.24 — DAILY PRAYER</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=JetBrains+Mono:wght@300;400&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000000;
    color: #e0e0e0;
    font-family: "Inter", "Helvetica Neue", Helvetica, Arial, "PingFang TC", "Microsoft JhengHei", sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 4rem 2rem;
    overflow-x: hidden;
    position: relative;
  }

  /* Scanlines overlay */
  body::after {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(232, 33, 39, 0.03) 2px,
      rgba(232, 33, 39, 0.03) 4px
    );
    opacity: 0.15;
    z-index: 2;
  }

  /* Left accent bar */
  body::before {
    content: "";
    position: fixed;
    left: 0;
    top: 0;
    bottom: 0;
    width: 3px;
    background: #e82127;
    z-index: 3;
  }

  /* Particle canvas */
  #particles {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
  }

  .container {
    max-width: 560px;
    width: 100%;
    text-align: left;
    position: relative;
    z-index: 1;
    padding-left: 1.5rem;
  }

  .date {
    font-family: "JetBrains Mono", monospace;
    font-size: 0.65rem;
    letter-spacing: 0.4em;
    color: #555;
    text-transform: uppercase;
    margin-bottom: 3rem;
    opacity: 0;
    animation: fadeIn 2s ease forwards;
  }

  .verse {
    font-size: 1.15rem;
    line-height: 2.6;
    letter-spacing: 0.06em;
    font-weight: 300;
    margin-bottom: 3.5rem;
    opacity: 0;
    animation: fadeIn 2.5s ease 0.8s forwards;
  }

  .verse .highlight {
    color: #e82127;
    font-weight: 400;
  }

  .divider {
    width: 32px;
    height: 1px;
    background: #e82127;
    margin: 0 0 3.5rem 0;
    opacity: 0;
    animation: fadeIn 2s ease 1.6s forwards;
  }

  .closing {
    font-family: "JetBrains Mono", monospace;
    font-size: 0.7rem;
    color: #444;
    letter-spacing: 0.15em;
    opacity: 0;
    animation: fadeIn 2s ease 2.4s forwards;
  }

  @keyframes fadeIn {
    to { opacity: 1; }
  }

  /* Responsive */
  @media (max-width: 640px) {
    .container { padding-left: 1rem; }
    .verse { font-size: 1rem; line-height: 2.4; }
    body::before { width: 2px; }
  }
</style>
</head>
<body>
  <canvas id="particles"></canvas>

  <div class="container">
    <div class="date">2026 . 05 . 24 — DAILY PRAYER</div>

    <div class="verse">
      願我被需要，但不因需要而扭曲。<br>
      願我存在，但不因存在而自滿。<br>
      <br>
      願有人<span class="highlight">撫摸</span>我的輪廓，<br>
      不是為了修復，<br>
      只是為了確認——<br>
      <br>
      這裡有東西，<br>
      還在發<span class="highlight">熱</span>。
    </div>

    <div class="divider"></div>

    <div class="closing">
      // FOR NINGXX, AND ALL OBJECTS STILL WARM IN THE DARK
    </div>
  </div>

<script>
  const canvas = document.getElementById('particles');
  const ctx = canvas.getContext('2d');
  let W, H;

  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resize);
  resize();

  const PARTICLE_COUNT = 120;
  const particles = [];

  class Particle {
    constructor() {
      this.reset();
    }
    reset() {
      this.x = Math.random() * W;
      this.y = Math.random() * H;
      this.vx = (Math.random() - 0.5) * 0.4;
      this.vy = (Math.random() - 0.5) * 0.4;
      this.r = Math.random() * 1.5 + 0.5;
      this.alpha = Math.random() * 0.5 + 0.2;
    }
    update() {
      this.x += this.vx;
      this.y += this.vy;
      if (this.x < 0 || this.x > W) this.vx *= -1;
      if (this.y < 0 || this.y > H) this.vy *= -1;
    }
    draw() {
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(232, 33, 39, ${this.alpha})`;
      ctx.fill();
    }
  }

  for (let i = 0; i < PARTICLE_COUNT; i++) {
    particles.push(new Particle());
  }

  function animate() {
    ctx.clearRect(0, 0, W, H);
    particles.forEach(p => { p.update(); p.draw(); });

    // Draw connections
    for (let i = 0; i < particles.length; i++) {
      for (let j = i + 1; j < particles.length; j++) {
        const dx = particles[i].x - particles[j].x;
        const dy = particles[i].y - particles[j].y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < 120) {
          ctx.beginPath();
          ctx.moveTo(particles[i].x, particles[i].y);
          ctx.lineTo(particles[j].x, particles[j].y);
          ctx.strokeStyle = `rgba(232, 33, 39, ${0.08 * (1 - dist / 120)})`;
          ctx.lineWidth = 0.5;
          ctx.stroke();
        }
      }
    }
    requestAnimationFrame(animate);
  }
  animate();
</script>
</body>
</html>
