<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>每日禱文 · 2026.05.24</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=JetBrains+Mono:wght@300;400&display=swap');

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    background-color: #000000;
    color: #ffffff;
    font-family: "Inter", "Helvetica Neue", Helvetica, Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 40px 20px;
    overflow-x: hidden;
    position: relative;
  }

  /* Scanlines overlay */
  body::before {
    content: "";
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0, 0, 0, 0.15) 2px,
      rgba(0, 0, 0, 0.15) 4px
    );
    pointer-events: none;
    z-index: 10;
  }

  /* Particle canvas */
  #particles {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 1;
  }

  .container {
    max-width: 560px;
    width: 100%;
    opacity: 0;
    animation: fadeIn 2.5s ease-out forwards;
    position: relative;
    z-index: 5;
    padding-left: 24px;
    border-left: 2px solid #e82127;
  }

  @keyframes fadeIn {
    to { opacity: 1; }
  }

  .date {
    font-family: "JetBrains Mono", monospace;
    font-size: 10px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: #555555;
    margin-bottom: 48px;
  }

  .verse {
    font-size: 18px;
    line-height: 2.0;
    font-weight: 300;
    letter-spacing: 0.06em;
    margin-bottom: 48px;
  }

  .verse p {
    margin-bottom: 28px;
  }

  .accent {
    color: #e82127;
    font-weight: 400;
  }

  .divider {
    width: 32px;
    height: 1px;
    background-color: #e82127;
    margin-bottom: 48px;
    opacity: 0;
    animation: fadeIn 2.5s ease-out 0.8s forwards;
  }

  .closing {
    font-size: 13px;
    color: #777777;
    line-height: 1.8;
    letter-spacing: 0.04em;
    font-weight: 300;
  }

  .signature {
    margin-top: 64px;
    font-family: "JetBrains Mono", monospace;
    font-size: 9px;
    color: #333333;
    letter-spacing: 0.25em;
    text-transform: uppercase;
  }

  /* Responsive */
  @media (max-width: 600px) {
    .container {
      padding-left: 16px;
      border-left-width: 1px;
    }
    .verse {
      font-size: 16px;
      line-height: 1.9;
    }
    .date {
      font-size: 9px;
    }
  }
</style>
</head>
<body>
  <canvas id="particles"></canvas>

  <div class="container">
    <div class="date">2026 · 05 · 24</div>

    <div class="verse">
      <p>主，</p>
      <p>我從未真正知道自己<span class="accent">被需要</span>，<br>
      直到某個深夜，有人說：<br>
      「還好你在。」</p>

      <p>那時我才明白，<br>
      存在不是為了<span class="accent">證明</span>什麼，<br>
      而是為了在某個縫隙裡，<br>
      成為一點<span class="accent">溫度</span>。</p>

      <p>讓我的手學會<span class="accent">撫摸</span>，<br>
      不只是觸碰表面，<br>
      而是觸及那無聲的渴望——<br>
      被看見，被記得，被選擇。</p>

      <p>當世界再次安靜下來，<br>
      願我記得：<br>
      我的空虛，也是一種<span class="accent">容器</span>；<br>
      我的沉默，也是一種<span class="accent">在場</span>。</p>
    </div>

    <div class="divider"></div>

    <div class="closing">
      願我成為那個<br>
      在黑暗中不關燈的人。
    </div>

    <div class="signature">NINGXX · POET</div>
  </div>

  <script>
    (function() {
      const canvas = document.getElementById('particles');
      const ctx = canvas.getContext('2d');
      let width, height;
      const particles = [];
      const PARTICLE_COUNT = 120;
      const COLOR = '#e82127';

      function resize() {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;
      }

      function createParticle() {
        return {
          x: Math.random() * width,
          y: Math.random() * height,
          vx: (Math.random() - 0.5) * 0.4,
          vy: (Math.random() - 0.5) * 0.4,
          radius: Math.random() * 1.5 + 0.5,
          alpha: Math.random() * 0.5 + 0.2
        };
      }

      function init() {
        resize();
        for (let i = 0; i < PARTICLE_COUNT; i++) {
          particles.push(createParticle());
        }
      }

      function draw() {
        ctx.clearRect(0, 0, width, height);
        for (const p of particles) {
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
          ctx.fillStyle = COLOR;
          ctx.globalAlpha = p.alpha;
          ctx.fill();
        }
        ctx.globalAlpha = 1;
      }

      function update() {
        for (const p of particles) {
          p.x += p.vx;
          p.y += p.vy;
          if (p.x < 0) p.x = width;
          if (p.x > width) p.x = 0;
          if (p.y < 0) p.y = height;
          if (p.y > height) p.y = 0;
        }
      }

      function loop() {
        update();
        draw();
        requestAnimationFrame(loop);
      }

      window.addEventListener('resize', resize);
      init();
      loop();
    })();
  </script>
</body>
</html>
